name: EAS Update

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'
      - '.github/workflows/eas-update.yml'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update (production)
        working-directory: apps/mobile
        run: eas update --branch production --non-interactive --message "${{ github.event.head_commit.message }}"
